
name: QA Auto Merge

on:
  schedule:
    - cron: '30 16 * * *'
  pull_request:
    types: [closed]
    branches:
      - 2.23.0

permissions:
  contents: write

concurrency:
  group: qa-auto-merge
  cancel-in-progress: false

jobs:
  merge:
    if: github.event_name == 'schedule' || github.event.pull_request.merged == true
    runs-on: "ubuntu-latest"
    env:
      SOURCE_BRANCH: 2.23.0
      TARGET_BRANCHES: "2.24.0 2.25.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all --prune

      - name: Merge source into target branches
        id: merge_step
        run: |
          set +e
          failed_branches=""
          success_branches=""

          for branch in $TARGET_BRANCHES; do
            echo "Processing $branch"

            if ! git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
              echo "Branch origin/$branch does not exist, skipping"
              failed_branches="${failed_branches:+$failed_branches, }$branch"
              continue
            fi

            git checkout -B "$branch" "origin/$branch"

            if git merge "origin/$SOURCE_BRANCH" --no-ff -m "Auto merge $SOURCE_BRANCH into $branch"; then
              if git push origin "$branch"; then
                echo "Merge successful: $branch"
                success_branches="${success_branches:+$success_branches, }$branch"
              else
                echo "Push failed: $branch"
                failed_branches="${failed_branches:+$failed_branches, }$branch"
              fi
            else
              echo "Merge conflict in $branch"
              git merge --abort || true
              failed_branches="${failed_branches:+$failed_branches, }$branch"
            fi
          done

          echo "failed_branches=$failed_branches" >> $GITHUB_OUTPUT
          echo "success_branches=$success_branches" >> $GITHUB_OUTPUT

          if [ -z "$failed_branches" ] && [ -n "$success_branches" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            exit 0
          elif [ -n "$failed_branches" ] && [ -n "$success_branches" ]; then
            echo "status=partial" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Generate Workflow Summary
        if: always()
        run: |
          echo "## 🔄 QA Auto Merge Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source Branch:** \`$SOURCE_BRANCH\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          SUCCESS_BRANCHES="${{ steps.merge_step.outputs.success_branches }}"
          FAILED_BRANCHES="${{ steps.merge_step.outputs.failed_branches }}"
          STATUS="${{ steps.merge_step.outputs.status }}"
          
          # Create results table
          echo "| Target Branch | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Add successful branches
          if [ -n "$SUCCESS_BRANCHES" ]; then
            IFS=', ' read -ra BRANCHES <<< "$SUCCESS_BRANCHES"
            for branch in "${BRANCHES[@]}"; do
              echo "| \`$branch\` | ✅ Success |" >> $GITHUB_STEP_SUMMARY
            done
          fi
          
          # Add failed branches
          if [ -n "$FAILED_BRANCHES" ]; then
            IFS=', ' read -ra BRANCHES <<< "$FAILED_BRANCHES"
            for branch in "${BRANCHES[@]}"; do
              echo "| \`$branch\` | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            done
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          
          # Overall status
          if [ "$STATUS" = "success" ]; then
            echo "### ✅ All merges completed successfully" >> $GITHUB_STEP_SUMMARY
          elif [ "$STATUS" = "partial" ]; then
            echo "### ⚠️ Partial success - some merges failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ All merges failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY

